<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 씨앗 요정 (Seed Spirit) — round seed with sprout -->
  <!-- Sprout leaves -->
  <g fill="#44AA22">
    <rect x="10" y="0"  width="4"  height="2"/>
    <rect x="6"  y="2"  width="4"  height="4"/>
    <rect x="20" y="2"  width="4"  height="4"/>
    <rect x="10" y="2"  width="4"  height="2"/>
  </g>
  <!-- Stem -->
  <g fill="#228800">
    <rect x="14" y="2"  width="4"  height="6"/>
  </g>
  <!-- Seed body -->
  <g fill="#88CC44">
    <rect x="8"  y="6"  width="16" height="2"/>
    <rect x="6"  y="8"  width="20" height="10"/>
    <rect x="8"  y="18" width="16" height="2"/>
    <rect x="10" y="20" width="12" height="2"/>
  </g>
  <!-- Seed highlight -->
  <g fill="#AADDAA">
    <rect x="10" y="8"  width="6"  height="4"/>
  </g>
  <!-- Cute eyes -->
  <g fill="#224400">
    <rect x="10" y="12" width="4"  height="4"/>
    <rect x="18" y="12" width="4"  height="4"/>
  </g>
  <g fill="#88EE44">
    <rect x="12" y="14" width="2"  height="2"/>
    <rect x="20" y="14" width="2"  height="2"/>
  </g>
  <!-- Tiny root legs -->
  <g fill="#AA7722">
    <rect x="10" y="22" width="4"  height="4"/>
    <rect x="18" y="22" width="4"  height="4"/>
    <rect x="8"  y="24" width="4"  height="2"/>
    <rect x="20" y="24" width="4"  height="2"/>
  </g>
</svg>
