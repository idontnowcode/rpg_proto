<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 글로비 (Green Slime) — 16×16 pixel art -->
  <!-- Highlight top -->
  <g fill="#88EE88">
    <rect x="10" y="2"  width="8"  height="2"/>
    <rect x="8"  y="4"  width="4"  height="2"/>
  </g>
  <!-- Body: medium green -->
  <g fill="#44BB44">
    <rect x="8"  y="2"  width="16" height="2"/>
    <rect x="6"  y="4"  width="20" height="4"/>
    <rect x="4"  y="8"  width="24" height="8"/>
    <rect x="6"  y="16" width="20" height="2"/>
    <rect x="8"  y="18" width="16" height="2"/>
    <rect x="10" y="20" width="12" height="2"/>
  </g>
  <!-- Dark outline base -->
  <g fill="#227722">
    <rect x="10" y="22" width="12" height="2"/>
    <rect x="6"  y="20" width="4"  height="2"/>
    <rect x="22" y="20" width="4"  height="2"/>
  </g>
  <!-- White eyes -->
  <g fill="#FFFFFF">
    <rect x="8"  y="8"  width="4"  height="4"/>
    <rect x="20" y="8"  width="4"  height="4"/>
  </g>
  <!-- Black pupils -->
  <g fill="#113311">
    <rect x="10" y="10" width="2"  height="2"/>
    <rect x="22" y="10" width="2"  height="2"/>
  </g>
  <!-- Smile -->
  <g fill="#227722">
    <rect x="10" y="14" width="2"  height="2"/>
    <rect x="20" y="14" width="2"  height="2"/>
    <rect x="12" y="16" width="8"  height="2"/>
  </g>
</svg>
