<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 심해 물고기 (Deep Sea Fish) — side view, dark -->
  <!-- Tail fin -->
  <g fill="#0A0A22">
    <rect x="24" y="4"  width="6"  height="4"/>
    <rect x="26" y="8"  width="4"  height="4"/>
    <rect x="24" y="12" width="6"  height="4"/>
  </g>
  <!-- Dark body -->
  <g fill="#1A1A44">
    <rect x="6"  y="8"  width="22" height="8"/>
    <rect x="8"  y="6"  width="18" height="2"/>
    <rect x="8"  y="16" width="18" height="2"/>
    <rect x="10" y="4"  width="10" height="2"/>
    <rect x="10" y="18" width="10" height="2"/>
  </g>
  <!-- Bioluminescent line -->
  <g fill="#0066AA">
    <rect x="10" y="11" width="16" height="2"/>
  </g>
  <!-- Spiky dorsal fin -->
  <g fill="#0A0A22">
    <rect x="10" y="2"  width="2"  height="4"/>
    <rect x="14" y="0"  width="2"  height="6"/>
    <rect x="18" y="2"  width="2"  height="4"/>
    <rect x="22" y="4"  width="2"  height="2"/>
  </g>
  <!-- Glowing anglerfish lure -->
  <g fill="#00AAFF">
    <rect x="4"  y="6"  width="2"  height="2"/>
    <rect x="2"  y="4"  width="4"  height="2"/>
  </g>
  <!-- Large menacing eye -->
  <g fill="#FFFFFF">
    <rect x="8"  y="10" width="4"  height="4"/>
  </g>
  <g fill="#000044">
    <rect x="10" y="12" width="2"  height="2"/>
  </g>
  <g fill="#0044FF">
    <rect x="8"  y="10" width="2"  height="2"/>
  </g>
</svg>
