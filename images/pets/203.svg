<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 그리블 (Goblin) — front-face portrait with big ears -->
  <!-- Big pointed ears -->
  <g fill="#3A6600">
    <rect x="0"  y="4"  width="8"  height="8"/>
    <rect x="24" y="4"  width="8"  height="8"/>
    <rect x="2"  y="2"  width="6"  height="4"/>
    <rect x="24" y="2"  width="6"  height="4"/>
  </g>
  <!-- Ear inner (pinkish) -->
  <g fill="#AA5533">
    <rect x="2"  y="6"  width="4"  height="4"/>
    <rect x="26" y="6"  width="4"  height="4"/>
  </g>
  <!-- Small horn stubs -->
  <g fill="#446600">
    <rect x="10" y="0"  width="4"  height="4"/>
    <rect x="18" y="0"  width="4"  height="4"/>
  </g>
  <!-- Head outline -->
  <g fill="#3A6600">
    <rect x="8"  y="2"  width="16" height="2"/>
    <rect x="6"  y="4"  width="20" height="2"/>
    <rect x="6"  y="14" width="20" height="2"/>
    <rect x="6"  y="6"  width="2"  height="8"/>
    <rect x="24" y="6"  width="2"  height="8"/>
    <rect x="10" y="14" width="4"  height="4"/><!-- nose -->
    <rect x="18" y="14" width="4"  height="4"/><!-- nose -->
  </g>
  <!-- Head: yellow-green skin -->
  <g fill="#5A8822">
    <rect x="8"  y="4"  width="16" height="10"/>
  </g>
  <!-- Large yellow eyes -->
  <g fill="#EEEE00">
    <rect x="8"  y="6"  width="6"  height="6"/>
    <rect x="18" y="6"  width="6"  height="6"/>
  </g>
  <g fill="#886600">
    <rect x="10" y="8"  width="2"  height="2"/>
    <rect x="20" y="8"  width="2"  height="2"/>
  </g>
  <!-- Bulbous nose -->
  <g fill="#448800">
    <rect x="12" y="11" width="8"  height="4"/>
  </g>
  <!-- Gap-toothed grin -->
  <g fill="#222200">
    <rect x="8"  y="14" width="16" height="4"/>
  </g>
  <g fill="#FFFFFF">
    <rect x="10" y="14" width="2"  height="4"/>
    <rect x="14" y="16" width="2"  height="2"/>
    <rect x="18" y="14" width="2"  height="4"/>
    <rect x="22" y="16" width="2"  height="2"/>
  </g>
  <!-- Leather collar/body -->
  <g fill="#554422">
    <rect x="8"  y="18" width="16" height="6"/>
  </g>
  <g fill="#3A6600">
    <rect x="10" y="18" width="12" height="2"/>
  </g>
</svg>
