<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 빛나는 물고기 (Glow Fish) — side view -->
  <!-- Tail fin -->
  <g fill="#2255AA">
    <rect x="24" y="6"  width="4"  height="2"/>
    <rect x="26" y="8"  width="4"  height="4"/>
    <rect x="24" y="12" width="4"  height="2"/>
  </g>
  <!-- Body: silver-blue with glow -->
  <g fill="#6699CC">
    <rect x="6"  y="8"  width="22" height="8"/>
    <rect x="8"  y="6"  width="18" height="2"/>
    <rect x="8"  y="16" width="18" height="2"/>
    <rect x="10" y="4"  width="12" height="2"/>
    <rect x="10" y="18" width="12" height="2"/>
  </g>
  <!-- Bioluminescent glow patches -->
  <g fill="#AAEEFF">
    <rect x="10" y="10" width="6"  height="4"/>
    <rect x="18" y="8"  width="4"  height="2"/>
  </g>
  <!-- Scales outline -->
  <g fill="#336688">
    <rect x="14" y="8"  width="2"  height="8"/>
    <rect x="20" y="8"  width="2"  height="8"/>
  </g>
  <!-- Eye: teal glow -->
  <g fill="#FFFFFF">
    <rect x="8"  y="10" width="4"  height="4"/>
  </g>
  <g fill="#00CCAA">
    <rect x="10" y="12" width="2"  height="2"/>
  </g>
  <!-- Dorsal fin -->
  <g fill="#4477AA">
    <rect x="10" y="4"  width="2"  height="4"/>
    <rect x="14" y="4"  width="2"  height="4"/>
    <rect x="18" y="4"  width="2"  height="4"/>
  </g>
  <!-- Glowing edge -->
  <g fill="#CCFFFF">
    <rect x="6"  y="10" width="2"  height="4"/>
  </g>
</svg>
