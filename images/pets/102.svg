<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 쉐이드 (Bat) — 16×16 pixel art -->
  <!-- Dark wing edge / outline: very dark purple -->
  <g fill="#2A0050">
    <rect x="0"  y="2"  width="2"  height="2"/><!-- row1 c0 -->
    <rect x="30" y="2"  width="2"  height="2"/><!-- row1 c15 -->
    <rect x="0"  y="4"  width="4"  height="2"/><!-- row2 c0,1 -->
    <rect x="28" y="4"  width="4"  height="2"/><!-- row2 c14,15 -->
    <rect x="2"  y="6"  width="4"  height="2"/><!-- row3 c1,2 -->
    <rect x="26" y="6"  width="4"  height="2"/><!-- row3 c13,14 -->
    <rect x="4"  y="8"  width="2"  height="2"/><!-- row4 c2 -->
    <rect x="24" y="8"  width="2"  height="2"/><!-- row4 c12 -->
  </g>
  <!-- Wing membrane: lighter purple -->
  <g fill="#6A40A0">
    <rect x="6"  y="8"  width="2"  height="2"/><!-- row4 c3 -->
    <rect x="22" y="8"  width="2"  height="2"/><!-- row4 c11 -->
    <rect x="6"  y="10" width="4"  height="2"/><!-- row5 c3,4 -->
    <rect x="20" y="10" width="4"  height="2"/><!-- row5 c10,11 -->
  </g>
  <!-- Body: dark purple -->
  <g fill="#4A2080">
    <!-- Row 5: cols 5-9 -->
    <rect x="10" y="10" width="10" height="2"/>
    <!-- Row 6: cols 4,5 + 7,8 + 10,11 -->
    <rect x="8"  y="12" width="4"  height="2"/>
    <rect x="14" y="12" width="4"  height="2"/>
    <rect x="20" y="12" width="4"  height="2"/>
    <!-- Rows 7-8: cols 4-11 (merged 2 rows) -->
    <rect x="8"  y="14" width="16" height="4"/>
    <!-- Row 9: cols 5-10 -->
    <rect x="10" y="18" width="12" height="2"/>
    <!-- Row 10: cols 6-9 -->
    <rect x="12" y="20" width="8"  height="2"/>
    <!-- Row 11: cols 7,8 (tail nub) -->
    <rect x="14" y="22" width="4"  height="2"/>
  </g>
  <!-- Glowing red eyes -->
  <g fill="#CC2200">
    <rect x="12" y="12" width="2" height="2"/><!-- c6 -->
    <rect x="18" y="12" width="2" height="2"/><!-- c9 -->
  </g>
</svg>
