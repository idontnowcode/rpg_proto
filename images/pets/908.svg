<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 저주받은 해골 (Cursed Skeleton) — cracked dark skull -->
  <!-- Skull: yellowed-dark bone -->
  <g fill="#998866">
    <rect x="8"  y="2"  width="16" height="12"/>
    <rect x="6"  y="4"  width="20" height="8"/>
  </g>
  <!-- Curse cracks -->
  <g fill="#552266">
    <rect x="10" y="2"  width="2"  height="6"/>
    <rect x="20" y="4"  width="2"  height="8"/>
    <rect x="14" y="6"  width="4"  height="2"/>
  </g>
  <!-- Jaw -->
  <g fill="#887755">
    <rect x="8"  y="12" width="16" height="4"/>
    <rect x="10" y="14" width="12" height="2"/>
  </g>
  <!-- Hollow eye sockets -->
  <g fill="#110022">
    <rect x="8"  y="6"  width="6"  height="6"/>
    <rect x="18" y="6"  width="6"  height="6"/>
  </g>
  <!-- Purple curse flame eyes -->
  <g fill="#AA22FF">
    <rect x="10" y="8"  width="2"  height="2"/>
    <rect x="20" y="8"  width="2"  height="2"/>
  </g>
  <g fill="#6600AA">
    <rect x="8"  y="6"  width="2"  height="2"/>
    <rect x="22" y="8"  width="2"  height="2"/>
  </g>
  <!-- Nose hollow -->
  <g fill="#110022">
    <rect x="14" y="10" width="4"  height="2"/>
  </g>
  <!-- Teeth -->
  <g fill="#CCBB88">
    <rect x="10" y="14" width="2"  height="4"/>
    <rect x="14" y="14" width="2"  height="4"/>
    <rect x="18" y="14" width="2"  height="4"/>
    <rect x="22" y="14" width="2"  height="4"/>
  </g>
  <!-- Cursed ribcage with glowing runes -->
  <g fill="#887755">
    <rect x="12" y="18" width="8"  height="10"/>
    <rect x="10" y="20" width="12" height="2"/>
    <rect x="10" y="24" width="12" height="2"/>
  </g>
  <!-- Curse runes on ribs -->
  <g fill="#AA22FF">
    <rect x="10" y="20" width="4"  height="2"/>
    <rect x="18" y="24" width="4"  height="2"/>
    <rect x="6"  y="18" width="4"  height="6"/>
    <rect x="22" y="18" width="4"  height="6"/>
  </g>
  <!-- Purple curse aura -->
  <g fill="#330055">
    <rect x="4"  y="6"  width="2"  height="8"/>
    <rect x="26" y="6"  width="2"  height="8"/>
    <rect x="8"  y="0"  width="16" height="2"/>
  </g>
</svg>
