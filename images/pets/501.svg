<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 불도마뱀 (Fire Salamander / Small Dragon) — side view -->
  <!-- Flame crest -->
  <g fill="#FFAA00">
    <rect x="4"  y="0"  width="2"  height="4"/>
    <rect x="8"  y="0"  width="2"  height="2"/>
    <rect x="6"  y="2"  width="2"  height="2"/>
  </g>
  <!-- Head -->
  <g fill="#CC3300">
    <rect x="2"  y="4"  width="12" height="8"/>
    <rect x="0"  y="8"  width="4"  height="4"/><!-- snout -->
  </g>
  <!-- Eye -->
  <g fill="#FFEE00">
    <rect x="4"  y="6"  width="4"  height="4"/>
  </g>
  <g fill="#882200">
    <rect x="6"  y="8"  width="2"  height="2"/>
  </g>
  <!-- Body scales -->
  <g fill="#AA2200">
    <rect x="12" y="6"  width="16" height="8"/>
    <rect x="14" y="4"  width="12" height="4"/>
  </g>
  <!-- Scale highlights -->
  <g fill="#EE4422">
    <rect x="14" y="8"  width="4"  height="4"/>
    <rect x="20" y="6"  width="4"  height="4"/>
  </g>
  <!-- Tail -->
  <g fill="#CC3300">
    <rect x="26" y="10" width="6"  height="4"/>
    <rect x="28" y="14" width="4"  height="4"/>
    <rect x="30" y="18" width="2"  height="6"/>
  </g>
  <!-- Legs: 4 stubs -->
  <g fill="#882200">
    <rect x="4"  y="12" width="4"  height="6"/>
    <rect x="12" y="12" width="4"  height="6"/>
    <rect x="18" y="12" width="4"  height="6"/>
    <rect x="24" y="12" width="4"  height="6"/>
  </g>
  <!-- Flame belly -->
  <g fill="#FF6600">
    <rect x="4"  y="10" width="22" height="2"/>
  </g>
</svg>
