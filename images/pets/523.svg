<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 심연의 지배자 (Demon Overlord) — supreme dark entity -->
  <!-- Three pairs of wings in background -->
  <g fill="#110011">
    <rect x="0"  y="4"  width="10" height="18"/>
    <rect x="22" y="4"  width="10" height="18"/>
  </g>
  <g fill="#220022">
    <rect x="0"  y="0"  width="8"  height="10"/>
    <rect x="24" y="0"  width="8"  height="10"/>
    <rect x="0"  y="18" width="8"  height="8"/>
    <rect x="24" y="18" width="8"  height="8"/>
  </g>
  <!-- Triple horns -->
  <g fill="#330044">
    <rect x="8"  y="0"  width="4"  height="6"/>
    <rect x="20" y="0"  width="4"  height="6"/>
    <rect x="12" y="0"  width="2"  height="4"/>
    <rect x="18" y="0"  width="2"  height="4"/>
  </g>
  <g fill="#6600AA">
    <rect x="10" y="0"  width="2"  height="2"/>
    <rect x="20" y="0"  width="2"  height="2"/>
  </g>
  <!-- Head: supreme darkness -->
  <g fill="#1A0022">
    <rect x="8"  y="4"  width="16" height="14"/>
    <rect x="6"  y="6"  width="20" height="10"/>
  </g>
  <!-- Red star eyes -->
  <g fill="#FF0000">
    <rect x="10" y="8"  width="4"  height="4"/>
    <rect x="18" y="8"  width="4"  height="4"/>
  </g>
  <g fill="#AA0000">
    <rect x="10" y="8"  width="2"  height="2"/>
    <rect x="20" y="8"  width="2"  height="2"/>
  </g>
  <g fill="#FF4400">
    <rect x="12" y="10" width="2"  height="2"/>
    <rect x="18" y="10" width="2"  height="2"/>
  </g>
  <!-- Void maw -->
  <g fill="#000000">
    <rect x="10" y="12" width="12" height="4"/>
  </g>
  <g fill="#440000">
    <rect x="12" y="14" width="8"  height="2"/>
  </g>
  <!-- Armored body with dark flame -->
  <g fill="#110011">
    <rect x="8"  y="18" width="16" height="10"/>
    <rect x="6"  y="20" width="20" height="6"/>
  </g>
  <!-- Dark fire collar -->
  <g fill="#550066">
    <rect x="8"  y="18" width="16" height="2"/>
  </g>
  <g fill="#7700AA">
    <rect x="10" y="16" width="12" height="2"/>
  </g>
  <!-- Trident emblem on chest -->
  <g fill="#AA0000">
    <rect x="14" y="20" width="4"  height="6"/>
    <rect x="12" y="20" width="8"  height="2"/>
    <rect x="12" y="22" width="2"  height="2"/>
    <rect x="18" y="22" width="2"  height="2"/>
  </g>
</svg>
