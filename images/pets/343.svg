<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 전기 장어 (Electric Eel) — S-curve body -->
  <!-- Electric glow outline -->
  <g fill="#FFEE00">
    <rect x="2"  y="2"  width="2"  height="2"/>
    <rect x="28" y="14" width="2"  height="2"/>
    <rect x="2"  y="26" width="2"  height="2"/>
  </g>
  <!-- Upper body segment -->
  <g fill="#886600">
    <rect x="4"  y="2"  width="14" height="4"/>
    <rect x="16" y="4"  width="12" height="4"/>
  </g>
  <!-- Middle body segment -->
  <g fill="#CCAA00">
    <rect x="4"  y="6"  width="12" height="4"/>
    <rect x="14" y="8"  width="14" height="4"/>
  </g>
  <!-- Lower body segment -->
  <g fill="#886600">
    <rect x="4"  y="10" width="14" height="4"/>
    <rect x="16" y="12" width="12" height="4"/>
  </g>
  <!-- Tail end -->
  <g fill="#CCAA00">
    <rect x="4"  y="14" width="12" height="4"/>
    <rect x="14" y="16" width="8"  height="4"/>
    <rect x="20" y="18" width="6"  height="4"/>
    <rect x="24" y="22" width="4"  height="4"/>
  </g>
  <!-- Blue stripes -->
  <g fill="#0044CC">
    <rect x="6"  y="4"  width="4"  height="2"/>
    <rect x="20" y="6"  width="4"  height="2"/>
    <rect x="6"  y="12" width="4"  height="2"/>
    <rect x="20" y="14" width="4"  height="2"/>
  </g>
  <!-- Lightning sparks -->
  <g fill="#FFEE00">
    <rect x="14" y="4"  width="2"  height="4"/>
    <rect x="14" y="12" width="2"  height="4"/>
    <rect x="22" y="8"  width="2"  height="4"/>
  </g>
  <!-- Head and eye -->
  <g fill="#FFCC00">
    <rect x="4"  y="2"  width="4"  height="4"/>
  </g>
  <g fill="#220000">
    <rect x="4"  y="2"  width="2"  height="2"/>
  </g>
</svg>
