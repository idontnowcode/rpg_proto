<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 암룡 (Dark Dragon) — imposing front-face -->
  <!-- Curved horns: dark purple -->
  <g fill="#220033">
    <rect x="4"  y="0"  width="6"  height="2"/>
    <rect x="22" y="0"  width="6"  height="2"/>
    <rect x="4"  y="2"  width="4"  height="4"/>
    <rect x="24" y="2"  width="4"  height="4"/>
    <rect x="6"  y="4"  width="4"  height="4"/>
    <rect x="22" y="4"  width="4"  height="4"/>
  </g>
  <!-- Horn glow: deep violet -->
  <g fill="#5500AA">
    <rect x="4"  y="2"  width="2"  height="2"/>
    <rect x="26" y="2"  width="2"  height="2"/>
  </g>
  <!-- Dark scale outline -->
  <g fill="#1A0022">
    <rect x="6"  y="6"  width="20" height="2"/>
    <rect x="4"  y="8"  width="24" height="2"/>
    <rect x="4"  y="16" width="24" height="2"/>
    <rect x="4"  y="10" width="2"  height="6"/>
    <rect x="26" y="10" width="2"  height="6"/>
    <rect x="12" y="14" width="8"  height="2"/>
  </g>
  <!-- Body: black-purple -->
  <g fill="#2A0044">
    <rect x="6"  y="8"  width="20" height="8"/>
    <rect x="8"  y="18" width="16" height="6"/>
  </g>
  <!-- Scale texture -->
  <g fill="#1A0033">
    <rect x="8"  y="10" width="4"  height="2"/>
    <rect x="16" y="10" width="4"  height="2"/>
    <rect x="6"  y="12" width="4"  height="2"/>
    <rect x="14" y="12" width="4"  height="2"/>
    <rect x="22" y="12" width="4"  height="2"/>
  </g>
  <!-- Dark muzzle -->
  <g fill="#3A0055">
    <rect x="10" y="12" width="12" height="4"/>
  </g>
  <!-- Purple glowing eyes -->
  <g fill="#AA00FF">
    <rect x="8"  y="10" width="4"  height="4"/>
    <rect x="20" y="10" width="4"  height="4"/>
  </g>
  <g fill="#5500AA">
    <rect x="10" y="12" width="2"  height="2"/>
    <rect x="22" y="12" width="2"  height="2"/>
  </g>
  <!-- Dark aura wisps -->
  <g fill="#220033">
    <rect x="2"  y="10" width="2"  height="6"/>
    <rect x="28" y="10" width="2"  height="6"/>
    <rect x="4"  y="6"  width="2"  height="2"/>
    <rect x="26" y="6"  width="2"  height="2"/>
  </g>
</svg>
