<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 크리퍼 (Rat) — 16×16 pixel art -->
  <!-- Dark brown: outline, tail -->
  <g fill="#5A3810">
    <rect x="6"  y="2"  width="2" height="2"/><!-- ear tip L -->
    <rect x="22" y="2"  width="2" height="2"/><!-- ear tip R -->
    <rect x="4"  y="4"  width="2" height="2"/><!-- ear outer L -->
    <rect x="8"  y="4"  width="2" height="2"/><!-- ear outer L -->
    <rect x="20" y="4"  width="2" height="2"/><!-- ear outer R -->
    <rect x="24" y="4"  width="2" height="2"/><!-- ear outer R -->
    <rect x="4"  y="6"  width="2" height="2"/>
    <rect x="8"  y="6"  width="2" height="2"/>
    <rect x="20" y="6"  width="2" height="2"/>
    <rect x="24" y="6"  width="2" height="2"/>
    <rect x="26" y="22" width="2" height="2"/><!-- tail start -->
    <rect x="28" y="24" width="2" height="2"/>
    <rect x="30" y="26" width="2" height="6"/><!-- tail tip rows 13-15 -->
  </g>
  <!-- Pink inner ear -->
  <g fill="#D49090">
    <rect x="6"  y="4"  width="2" height="4"/>
    <rect x="22" y="4"  width="2" height="4"/>
  </g>
  <!-- Body: warm gray-brown -->
  <g fill="#9E8060">
    <!-- Row 4: cols 3-10 -->
    <rect x="6"  y="8"  width="16" height="2"/>
    <!-- Row 5: cols 2-11 -->
    <rect x="4"  y="10" width="20" height="2"/>
    <!-- Row 6: cols 2,3 + 5,6,7,8 + 10,11 -->
    <rect x="4"  y="12" width="4"  height="2"/>
    <rect x="10" y="12" width="8"  height="2"/>
    <rect x="20" y="12" width="4"  height="2"/>
    <!-- Row 7: cols 2-11 -->
    <rect x="4"  y="14" width="20" height="2"/>
    <!-- Rows 8-10: cols 1-12 (merged) -->
    <rect x="2"  y="16" width="24" height="6"/>
    <!-- Row 11: cols 1-12 -->
    <rect x="2"  y="22" width="24" height="2"/>
    <!-- Row 12: cols 2,3 + 5-9 + 11 -->
    <rect x="4"  y="24" width="4"  height="2"/>
    <rect x="10" y="24" width="10" height="2"/>
    <rect x="22" y="24" width="2"  height="2"/>
    <!-- Row 13: col 2 + cols 5-9 -->
    <rect x="4"  y="26" width="2"  height="2"/>
    <rect x="10" y="26" width="10" height="2"/>
  </g>
  <!-- Red eyes -->
  <g fill="#CC2200">
    <rect x="8"  y="12" width="2" height="2"/>
    <rect x="18" y="12" width="2" height="2"/>
  </g>
</svg>
