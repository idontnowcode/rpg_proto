<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 철 골렘 (Iron Golem) — polished black metal humanoid -->
  <!-- Head: angular iron helmet -->
  <g fill="#1A2222">
    <rect x="8"  y="0"  width="16" height="10"/>
    <rect x="6"  y="2"  width="20" height="6"/>
  </g>
  <!-- Metal sheen highlights -->
  <g fill="#445566">
    <rect x="8"  y="0"  width="4"  height="2"/>
    <rect x="26" y="4"  width="2"  height="4"/>
  </g>
  <!-- Red magicore eyes -->
  <g fill="#FF2200">
    <rect x="10" y="4"  width="4"  height="4"/>
    <rect x="18" y="4"  width="4"  height="4"/>
  </g>
  <g fill="#880000">
    <rect x="12" y="6"  width="2"  height="2"/>
    <rect x="20" y="6"  width="2"  height="2"/>
  </g>
  <!-- Body: black iron plate armor -->
  <g fill="#222E2E">
    <rect x="6"  y="10" width="20" height="12"/>
    <rect x="4"  y="12" width="24" height="8"/>
  </g>
  <!-- Iron arms -->
  <g fill="#1A2222">
    <rect x="0"  y="10" width="6"  height="14"/>
    <rect x="26" y="10" width="6"  height="14"/>
  </g>
  <!-- Rivet/panel details -->
  <g fill="#334444">
    <rect x="8"  y="12" width="4"  height="2"/>
    <rect x="20" y="12" width="4"  height="2"/>
    <rect x="14" y="10" width="4"  height="2"/>
    <rect x="4"  y="14" width="2"  height="2"/>
    <rect x="26" y="14" width="2"  height="2"/>
  </g>
  <!-- Red power core in chest -->
  <g fill="#FF0000">
    <rect x="12" y="14" width="8"  height="6"/>
  </g>
  <g fill="#AA0000">
    <rect x="14" y="16" width="4"  height="2"/>
  </g>
  <!-- Legs: iron pistons -->
  <g fill="#1A2222">
    <rect x="8"  y="22" width="6"  height="10"/>
    <rect x="18" y="22" width="6"  height="10"/>
  </g>
  <g fill="#334444">
    <rect x="10" y="24" width="2"  height="6"/>
    <rect x="20" y="24" width="2"  height="6"/>
  </g>
</svg>
