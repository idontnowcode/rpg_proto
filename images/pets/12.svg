<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 아쿠론 (Water Dragon) — front-face portrait -->
  <!-- Horns -->
  <g fill="#113366">
    <rect x="8"  y="0"  width="4"  height="6"/>
    <rect x="20" y="0"  width="4"  height="6"/>
    <rect x="6"  y="2"  width="4"  height="2"/>
    <rect x="22" y="2"  width="4"  height="2"/>
  </g>
  <!-- Scale outline / dark edges -->
  <g fill="#2255AA">
    <rect x="6"  y="4"  width="20" height="2"/>
    <rect x="4"  y="6"  width="24" height="2"/>
    <rect x="4"  y="16" width="24" height="2"/>
    <rect x="4"  y="8"  width="2"  height="8"/>
    <rect x="26" y="8"  width="2"  height="8"/>
    <rect x="12" y="14" width="8"  height="2"/><!-- snout bottom -->
  </g>
  <!-- Main scales: aqua -->
  <g fill="#4488CC">
    <rect x="6"  y="6"  width="20" height="10"/>
    <rect x="8"  y="18" width="16" height="6"/><!-- chest -->
  </g>
  <!-- Scale pattern -->
  <g fill="#3366AA">
    <rect x="8"  y="8"  width="4"  height="2"/>
    <rect x="16" y="8"  width="4"  height="2"/>
    <rect x="24" y="8"  width="2"  height="2"/>
    <rect x="6"  y="10" width="4"  height="2"/>
    <rect x="14" y="10" width="4"  height="2"/>
    <rect x="22" y="10" width="4"  height="2"/>
  </g>
  <!-- Lighter snout/muzzle -->
  <g fill="#66AADD">
    <rect x="10" y="12" width="12" height="4"/>
  </g>
  <!-- Teal glowing eyes -->
  <g fill="#00EECC">
    <rect x="8"  y="8"  width="4"  height="4"/>
    <rect x="20" y="8"  width="4"  height="4"/>
  </g>
  <g fill="#006644">
    <rect x="10" y="10" width="2"  height="2"/>
    <rect x="22" y="10" width="2"  height="2"/>
  </g>
  <!-- Water droplets (accent) -->
  <g fill="#88CCFF">
    <rect x="6"  y="20" width="2"  height="2"/>
    <rect x="24" y="20" width="2"  height="2"/>
  </g>
</svg>
