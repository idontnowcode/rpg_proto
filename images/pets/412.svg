<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 강철 딱정벌레 (Steel Beetle) — top-down view -->
  <!-- Antennae -->
  <g fill="#445566">
    <rect x="10" y="0"  width="2"  height="4"/>
    <rect x="20" y="0"  width="2"  height="4"/>
    <rect x="6"  y="0"  width="4"  height="2"/>
    <rect x="22" y="0"  width="4"  height="2"/>
  </g>
  <!-- Head -->
  <g fill="#556677">
    <rect x="8"  y="4"  width="16" height="6"/>
  </g>
  <!-- Eyes -->
  <g fill="#FFEE00">
    <rect x="8"  y="6"  width="4"  height="2"/>
    <rect x="20" y="6"  width="4"  height="2"/>
  </g>
  <!-- Wing covers (elytra): metallic silver with rivet pattern -->
  <g fill="#8899AA">
    <rect x="4"  y="10" width="10" height="14"/><!-- left wing cover -->
    <rect x="18" y="10" width="10" height="14"/><!-- right wing cover -->
  </g>
  <!-- Wing seam center -->
  <g fill="#334455">
    <rect x="14" y="10" width="4"  height="14"/>
    <rect x="4"  y="10" width="24" height="2"/><!-- head-wing joint -->
    <rect x="4"  y="22" width="24" height="2"/><!-- wing edge -->
  </g>
  <!-- Rivet details -->
  <g fill="#CCDDEE">
    <rect x="6"  y="12" width="2"  height="2"/>
    <rect x="24" y="12" width="2"  height="2"/>
    <rect x="6"  y="18" width="2"  height="2"/>
    <rect x="24" y="18" width="2"  height="2"/>
    <rect x="10" y="16" width="2"  height="2"/>
    <rect x="20" y="16" width="2"  height="2"/>
  </g>
  <!-- Legs: 3 pairs -->
  <g fill="#334455">
    <rect x="0"  y="12" width="4"  height="2"/>
    <rect x="28" y="12" width="4"  height="2"/>
    <rect x="0"  y="16" width="4"  height="2"/>
    <rect x="28" y="16" width="4"  height="2"/>
    <rect x="0"  y="20" width="4"  height="2"/>
    <rect x="28" y="20" width="4"  height="2"/>
  </g>
</svg>
