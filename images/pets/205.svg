<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 아에테르나 (Star Spirit) — radiant ethereal star being -->
  <!-- Outer star rays -->
  <g fill="#AABBDD">
    <rect x="14" y="0"  width="4"  height="6"/><!-- top ray -->
    <rect x="14" y="26" width="4"  height="6"/><!-- bottom ray -->
    <rect x="0"  y="14" width="6"  height="4"/><!-- left ray -->
    <rect x="26" y="14" width="6"  height="4"/><!-- right ray -->
    <rect x="4"  y="4"  width="4"  height="4"/><!-- top-left ray -->
    <rect x="24" y="4"  width="4"  height="4"/><!-- top-right ray -->
    <rect x="4"  y="24" width="4"  height="4"/><!-- bot-left ray -->
    <rect x="24" y="24" width="4"  height="4"/><!-- bot-right ray -->
  </g>
  <!-- Mid rays (gold transition) -->
  <g fill="#CCDDEE">
    <rect x="12" y="2"  width="8"  height="6"/>
    <rect x="12" y="24" width="8"  height="6"/>
    <rect x="2"  y="12" width="6"  height="8"/>
    <rect x="24" y="12" width="6"  height="8"/>
    <rect x="6"  y="6"  width="6"  height="6"/>
    <rect x="20" y="6"  width="6"  height="6"/>
    <rect x="6"  y="20" width="6"  height="6"/>
    <rect x="20" y="20" width="6"  height="6"/>
  </g>
  <!-- Inner body: bright silver-white -->
  <g fill="#EEFFFF">
    <rect x="8"  y="8"  width="16" height="16"/>
    <rect x="6"  y="10" width="20" height="12"/>
    <rect x="10" y="6"  width="12" height="20"/>
  </g>
  <!-- Core: pure white -->
  <g fill="#FFFFFF">
    <rect x="10" y="10" width="12" height="12"/>
    <rect x="8"  y="12" width="16" height="8"/>
    <rect x="12" y="8"  width="8"  height="16"/>
  </g>
  <!-- Twin star eyes -->
  <g fill="#FFEEAA">
    <rect x="10" y="12" width="4"  height="4"/>
    <rect x="18" y="12" width="4"  height="4"/>
  </g>
  <g fill="#FFFFFF">
    <rect x="12" y="14" width="2"  height="2"/>
    <rect x="20" y="14" width="2"  height="2"/>
  </g>
  <!-- Gold particle scatter -->
  <g fill="#FFEE88">
    <rect x="0"  y="0"  width="2"  height="2"/>
    <rect x="30" y="0"  width="2"  height="2"/>
    <rect x="0"  y="30" width="2"  height="2"/>
    <rect x="30" y="30" width="2"  height="2"/>
    <rect x="14" y="0"  width="4"  height="2"/>
    <rect x="0"  y="14" width="2"  height="4"/>
  </g>
</svg>
