<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 돌 골렘 (Stone Golem) — blocky humanoid front view -->
  <!-- Head: rough stone block -->
  <g fill="#554433">
    <rect x="8"  y="0"  width="16" height="10"/>
  </g>
  <!-- Head detail / crack lines -->
  <g fill="#332211">
    <rect x="12" y="2"  width="2"  height="6"/>
    <rect x="8"  y="4"  width="16" height="2"/>
  </g>
  <!-- Stone highlights -->
  <g fill="#776655">
    <rect x="8"  y="0"  width="6"  height="4"/>
    <rect x="22" y="4"  width="2"  height="4"/>
  </g>
  <!-- Orange glowing eyes (magic stone) -->
  <g fill="#FFAA22">
    <rect x="10" y="4"  width="4"  height="4"/>
    <rect x="18" y="4"  width="4"  height="4"/>
  </g>
  <g fill="#883300">
    <rect x="12" y="6"  width="2"  height="2"/>
    <rect x="20" y="6"  width="2"  height="2"/>
  </g>
  <!-- Body: thick stone torso -->
  <g fill="#665544">
    <rect x="6"  y="10" width="20" height="12"/>
    <rect x="4"  y="12" width="24" height="8"/>
  </g>
  <!-- Arms: thick stone slabs -->
  <g fill="#554433">
    <rect x="0"  y="10" width="6"  height="14"/>
    <rect x="26" y="10" width="6"  height="14"/>
  </g>
  <!-- Mossy patches -->
  <g fill="#446633">
    <rect x="4"  y="14" width="2"  height="4"/>
    <rect x="26" y="16" width="2"  height="4"/>
    <rect x="10" y="20" width="4"  height="2"/>
    <rect x="18" y="20" width="4"  height="2"/>
  </g>
  <!-- Legs: heavy stone columns -->
  <g fill="#554433">
    <rect x="8"  y="22" width="6"  height="10"/>
    <rect x="18" y="22" width="6"  height="10"/>
  </g>
  <!-- Chest crack with glow -->
  <g fill="#FFAA22">
    <rect x="14" y="14" width="4"  height="6"/>
  </g>
  <g fill="#AA6600">
    <rect x="14" y="16" width="4"  height="2"/>
  </g>
</svg>
