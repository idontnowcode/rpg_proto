<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 별의 용 (Star Dragon) — galaxy-scale portrait -->
  <!-- Star constellation horns -->
  <g fill="#334466">
    <rect x="6"  y="0"  width="4"  height="6"/>
    <rect x="22" y="0"  width="4"  height="6"/>
    <rect x="4"  y="2"  width="4"  height="2"/>
    <rect x="24" y="2"  width="4"  height="2"/>
  </g>
  <g fill="#AABBDD">
    <rect x="8"  y="0"  width="2"  height="2"/>
    <rect x="22" y="0"  width="2"  height="2"/>
  </g>
  <!-- Scale outline: navy-silver -->
  <g fill="#334466">
    <rect x="6"  y="6"  width="20" height="2"/>
    <rect x="4"  y="8"  width="24" height="2"/>
    <rect x="4"  y="16" width="24" height="2"/>
    <rect x="4"  y="10" width="2"  height="6"/>
    <rect x="26" y="10" width="2"  height="6"/>
    <rect x="12" y="14" width="8"  height="2"/>
  </g>
  <!-- Silver-blue scales -->
  <g fill="#6688BB">
    <rect x="6"  y="8"  width="20" height="8"/>
    <rect x="8"  y="18" width="16" height="6"/>
  </g>
  <!-- Galaxy scale shimmer -->
  <g fill="#8899CC">
    <rect x="8"  y="10" width="4"  height="2"/>
    <rect x="16" y="10" width="4"  height="2"/>
    <rect x="6"  y="12" width="4"  height="2"/>
    <rect x="22" y="12" width="4"  height="2"/>
  </g>
  <!-- Silver muzzle -->
  <g fill="#AABBDD">
    <rect x="10" y="12" width="12" height="4"/>
  </g>
  <!-- Star eyes: warm golden -->
  <g fill="#FFEEAA">
    <rect x="8"  y="10" width="4"  height="4"/>
    <rect x="20" y="10" width="4"  height="4"/>
  </g>
  <g fill="#AA8800">
    <rect x="10" y="12" width="2"  height="2"/>
    <rect x="22" y="12" width="2"  height="2"/>
  </g>
  <!-- Starlight particles -->
  <g fill="#FFFFFF">
    <rect x="2"  y="8"  width="2"  height="2"/>
    <rect x="28" y="10" width="2"  height="2"/>
    <rect x="4"  y="18" width="2"  height="2"/>
    <rect x="26" y="20" width="2"  height="2"/>
    <rect x="14" y="20" width="2"  height="2"/>
  </g>
</svg>
