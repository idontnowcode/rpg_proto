<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 대악마 (Greater Demon) — imposing dark demon -->
  <!-- Double curved horns -->
  <g fill="#220033">
    <rect x="4"  y="0"  width="4"  height="2"/>
    <rect x="24" y="0"  width="4"  height="2"/>
    <rect x="4"  y="2"  width="6"  height="4"/>
    <rect x="22" y="2"  width="6"  height="4"/>
    <rect x="6"  y="6"  width="4"  height="4"/>
    <rect x="22" y="6"  width="4"  height="4"/>
  </g>
  <!-- Large wings in background -->
  <g fill="#1A0022">
    <rect x="0"  y="10" width="10" height="14"/>
    <rect x="22" y="10" width="10" height="14"/>
    <rect x="0"  y="8"  width="8"  height="6"/>
    <rect x="24" y="8"  width="8"  height="6"/>
  </g>
  <g fill="#330044">
    <rect x="2"  y="12" width="6"  height="8"/>
    <rect x="24" y="12" width="6"  height="8"/>
  </g>
  <!-- Head: dark purple armor skin -->
  <g fill="#3A0044">
    <rect x="8"  y="4"  width="16" height="12"/>
    <rect x="6"  y="6"  width="20" height="8"/>
  </g>
  <!-- Armor highlight -->
  <g fill="#5500AA">
    <rect x="8"  y="4"  width="4"  height="2"/>
    <rect x="24" y="8"  width="2"  height="4"/>
  </g>
  <!-- Golden glowing eyes -->
  <g fill="#FFCC00">
    <rect x="10" y="8"  width="4"  height="4"/>
    <rect x="18" y="8"  width="4"  height="4"/>
  </g>
  <g fill="#AA6600">
    <rect x="12" y="10" width="2"  height="2"/>
    <rect x="20" y="10" width="2"  height="2"/>
  </g>
  <!-- Dark fire shoulder flames -->
  <g fill="#AA0066">
    <rect x="6"  y="10" width="4"  height="4"/>
    <rect x="22" y="10" width="4"  height="4"/>
  </g>
  <!-- Body: armored torso -->
  <g fill="#2A0033">
    <rect x="8"  y="16" width="16" height="12"/>
    <rect x="6"  y="18" width="20" height="8"/>
  </g>
  <!-- Chest armor emblem -->
  <g fill="#AA0099">
    <rect x="12" y="18" width="8"  height="6"/>
  </g>
  <g fill="#440033">
    <rect x="14" y="20" width="4"  height="2"/>
  </g>
</svg>
