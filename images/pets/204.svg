<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 루파르 (Werewolf) — upright wolf-humanoid, menacing -->
  <!-- Pointed wolf ears -->
  <g fill="#1A1A1A">
    <rect x="6"  y="0"  width="4"  height="6"/>
    <rect x="22" y="0"  width="4"  height="6"/>
    <rect x="4"  y="2"  width="4"  height="4"/>
    <rect x="24" y="2"  width="4"  height="4"/>
  </g>
  <g fill="#552222">
    <rect x="8"  y="2"  width="2"  height="4"/>
    <rect x="22" y="2"  width="2"  height="4"/>
  </g>
  <!-- Head: dark grey-black fur -->
  <g fill="#2A2A2A">
    <rect x="6"  y="4"  width="20" height="12"/>
    <rect x="4"  y="6"  width="24" height="8"/>
  </g>
  <!-- Snout (protruding) -->
  <g fill="#333333">
    <rect x="10" y="12" width="12" height="6"/>
  </g>
  <!-- Red eyes, menacing -->
  <g fill="#DD0000">
    <rect x="8"  y="8"  width="4"  height="4"/>
    <rect x="20" y="8"  width="4"  height="4"/>
  </g>
  <g fill="#AA0000">
    <rect x="10" y="10" width="2"  height="2"/>
    <rect x="22" y="10" width="2"  height="2"/>
  </g>
  <!-- Fangs showing -->
  <g fill="#FFFFFF">
    <rect x="12" y="16" width="2"  height="4"/>
    <rect x="18" y="16" width="2"  height="4"/>
  </g>
  <!-- Body: muscular -->
  <g fill="#221111">
    <rect x="8"  y="18" width="16" height="10"/>
    <rect x="6"  y="20" width="20" height="6"/>
  </g>
  <!-- Outstretched clawed arms -->
  <g fill="#1A1A1A">
    <rect x="0"  y="16" width="8"  height="8"/>
    <rect x="24" y="16" width="8"  height="8"/>
  </g>
  <!-- Claws -->
  <g fill="#888888">
    <rect x="0"  y="22" width="2"  height="4"/>
    <rect x="2"  y="24" width="2"  height="2"/>
    <rect x="4"  y="22" width="2"  height="4"/>
    <rect x="28" y="22" width="2"  height="4"/>
    <rect x="28" y="24" width="2"  height="2"/>
    <rect x="26" y="22" width="2"  height="4"/>
  </g>
  <!-- Chest fur texture -->
  <g fill="#333333">
    <rect x="12" y="20" width="8"  height="2"/>
  </g>
</svg>
