<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 화염 요정 (Fire Fairy) — winged humanoid, fiery -->
  <!-- Fire wings: orange-red -->
  <g fill="#CC4400">
    <rect x="0"  y="4"  width="10" height="2"/>
    <rect x="0"  y="6"  width="12" height="2"/>
    <rect x="0"  y="8"  width="10" height="2"/>
    <rect x="2"  y="10" width="8"  height="2"/>
    <rect x="22" y="4"  width="10" height="2"/>
    <rect x="20" y="6"  width="12" height="2"/>
    <rect x="22" y="8"  width="10" height="2"/>
    <rect x="22" y="10" width="8"  height="2"/>
    <rect x="2"  y="12" width="8"  height="4"/>
    <rect x="22" y="12" width="8"  height="4"/>
  </g>
  <!-- Wing flame tips -->
  <g fill="#FFDD00">
    <rect x="0"  y="4"  width="4"  height="2"/>
    <rect x="28" y="4"  width="4"  height="2"/>
    <rect x="2"  y="6"  width="4"  height="4"/>
    <rect x="26" y="6"  width="4"  height="4"/>
  </g>
  <!-- Fire spark hands -->
  <g fill="#FFAA00">
    <rect x="8"  y="14" width="4"  height="2"/>
    <rect x="20" y="14" width="4"  height="2"/>
  </g>
  <!-- Hair: dark flame -->
  <g fill="#882200">
    <rect x="12" y="0"  width="8"  height="4"/>
    <rect x="10" y="2"  width="2"  height="4"/>
    <rect x="20" y="2"  width="2"  height="4"/>
  </g>
  <!-- Flame hair tips -->
  <g fill="#FFAA00">
    <rect x="12" y="0"  width="4"  height="2"/>
    <rect x="18" y="0"  width="2"  height="2"/>
  </g>
  <!-- Head: warm tan skin -->
  <g fill="#DD7744">
    <rect x="12" y="2"  width="8"  height="8"/>
  </g>
  <!-- Eyes: golden fire -->
  <g fill="#FFDD00">
    <rect x="12" y="4"  width="2"  height="2"/>
    <rect x="18" y="4"  width="2"  height="2"/>
  </g>
  <!-- Body: red tunic -->
  <g fill="#CC3300">
    <rect x="12" y="10" width="8"  height="8"/>
  </g>
  <g fill="#882200">
    <rect x="12" y="14" width="8"  height="2"/>
  </g>
  <!-- Legs -->
  <g fill="#AA2200">
    <rect x="12" y="18" width="4"  height="8"/>
    <rect x="16" y="18" width="4"  height="8"/>
  </g>
  <g fill="#661100">
    <rect x="10" y="24" width="4"  height="2"/>
    <rect x="18" y="24" width="4"  height="2"/>
  </g>
</svg>
