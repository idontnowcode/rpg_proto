<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 빛의 봉황 (Light Phoenix) — radiant gold/white -->
  <!-- Outer glow halo -->
  <g fill="#FFFFAA">
    <rect x="0"  y="4"  width="4"  height="4"/>
    <rect x="28" y="4"  width="4"  height="4"/>
    <rect x="0"  y="12" width="2"  height="4"/>
    <rect x="30" y="12" width="2"  height="4"/>
  </g>
  <!-- Wings: brilliant gold -->
  <g fill="#FFCC44">
    <rect x="2"  y="2"  width="10" height="12"/>
    <rect x="20" y="2"  width="10" height="12"/>
    <rect x="0"  y="6"  width="4"  height="8"/>
    <rect x="28" y="6"  width="4"  height="8"/>
  </g>
  <!-- Wing inner glow -->
  <g fill="#FFEEAA">
    <rect x="4"  y="4"  width="6"  height="8"/>
    <rect x="22" y="4"  width="6"  height="8"/>
  </g>
  <!-- Body: white gold -->
  <g fill="#FFFFFF">
    <rect x="12" y="0"  width="8"  height="8"/>
    <rect x="10" y="8"  width="12" height="10"/>
    <rect x="12" y="18" width="8"  height="4"/>
  </g>
  <!-- Golden beak -->
  <g fill="#FFDD00">
    <rect x="14" y="6"  width="4"  height="4"/>
  </g>
  <!-- Radiant eyes -->
  <g fill="#FFEE88">
    <rect x="12" y="2"  width="2"  height="2"/>
    <rect x="18" y="2"  width="2"  height="2"/>
  </g>
  <!-- Tail: multicolor flame fan -->
  <g fill="#FF8800">
    <rect x="6"  y="22" width="4"  height="6"/>
    <rect x="22" y="22" width="4"  height="6"/>
  </g>
  <g fill="#FFDD00">
    <rect x="10" y="24" width="4"  height="4"/>
    <rect x="18" y="24" width="4"  height="4"/>
  </g>
  <g fill="#FFFFFF">
    <rect x="14" y="22" width="4"  height="6"/>
  </g>
  <!-- Light particle accents -->
  <g fill="#FFFFFF">
    <rect x="2"  y="2"  width="2"  height="2"/>
    <rect x="28" y="2"  width="2"  height="2"/>
    <rect x="0"  y="16" width="2"  height="2"/>
    <rect x="30" y="16" width="2"  height="2"/>
  </g>
</svg>
