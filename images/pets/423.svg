<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 번개 영령 (Thunder Spirit/Ghost) — 16×16 pixel art -->
  <!-- Lightning crown -->
  <g fill="#FFFFFF">
    <rect x="12" y="0"  width="8"  height="2"/>
    <rect x="8"  y="2"  width="4"  height="2"/>
    <rect x="20" y="2"  width="4"  height="2"/>
  </g>
  <!-- Bright yellow highlight -->
  <g fill="#FFEE66">
    <rect x="10" y="2"  width="12" height="2"/>
    <rect x="8"  y="4"  width="16" height="2"/>
  </g>
  <!-- Main body: yellow ghost -->
  <g fill="#DDAA00">
    <rect x="6"  y="4"  width="20" height="2"/>
    <rect x="6"  y="6"  width="20" height="8"/>
    <rect x="6"  y="14" width="20" height="2"/>
    <rect x="4"  y="16" width="24" height="2"/>
    <rect x="4"  y="18" width="6"  height="2"/>
    <rect x="14" y="18" width="4"  height="2"/>
    <rect x="22" y="18" width="6"  height="2"/>
    <rect x="4"  y="20" width="4"  height="2"/>
    <rect x="14" y="20" width="4"  height="2"/>
    <rect x="24" y="20" width="4"  height="2"/>
  </g>
  <!-- White glowing eyes -->
  <g fill="#FFFFFF">
    <rect x="10" y="8"  width="4"  height="4"/>
    <rect x="18" y="8"  width="4"  height="4"/>
  </g>
  <g fill="#AA7700">
    <rect x="12" y="10" width="2"  height="2"/>
    <rect x="20" y="10" width="2"  height="2"/>
  </g>
  <!-- Lightning bolt side accents -->
  <g fill="#FFEE00">
    <rect x="2"  y="8"  width="4"  height="2"/>
    <rect x="4"  y="10" width="2"  height="2"/>
    <rect x="26" y="8"  width="4"  height="2"/>
    <rect x="26" y="10" width="2"  height="2"/>
  </g>
</svg>
