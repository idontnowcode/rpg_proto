<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 번개 나방 (Thunder Moth) — front-facing with wings -->
  <!-- Wing tips: electric yellow -->
  <g fill="#FFEE00">
    <rect x="0"  y="6"  width="4"  height="4"/>
    <rect x="28" y="6"  width="4"  height="4"/>
    <rect x="2"  y="16" width="4"  height="4"/>
    <rect x="26" y="16" width="4"  height="4"/>
  </g>
  <!-- Upper wings: blue-yellow -->
  <g fill="#4466BB">
    <rect x="2"  y="4"  width="10" height="12"/>
    <rect x="20" y="4"  width="10" height="12"/>
    <rect x="0"  y="6"  width="4"  height="8"/>
    <rect x="28" y="6"  width="4"  height="8"/>
  </g>
  <!-- Lower wings: smaller -->
  <g fill="#3355AA">
    <rect x="4"  y="16" width="8"  height="8"/>
    <rect x="20" y="16" width="8"  height="8"/>
    <rect x="2"  y="18" width="4"  height="6"/>
    <rect x="26" y="18" width="4"  height="6"/>
  </g>
  <!-- Lightning bolt wing patterns -->
  <g fill="#FFEE00">
    <rect x="4"  y="6"  width="2"  height="4"/>
    <rect x="6"  y="8"  width="2"  height="4"/>
    <rect x="24" y="6"  width="2"  height="4"/>
    <rect x="22" y="8"  width="2"  height="4"/>
  </g>
  <!-- Body: dark thorax -->
  <g fill="#223355">
    <rect x="12" y="2"  width="8"  height="6"/><!-- head -->
    <rect x="12" y="8"  width="8"  height="10"/><!-- thorax/abdomen -->
    <rect x="14" y="18" width="4"  height="8"/><!-- abdomen tip -->
  </g>
  <!-- Antennae with electric tips -->
  <g fill="#334466">
    <rect x="12" y="0"  width="2"  height="4"/>
    <rect x="18" y="0"  width="2"  height="4"/>
  </g>
  <g fill="#FFEE00">
    <rect x="10" y="0"  width="2"  height="2"/>
    <rect x="20" y="0"  width="2"  height="2"/>
  </g>
  <!-- Eyes -->
  <g fill="#AACC00">
    <rect x="12" y="4"  width="2"  height="2"/>
    <rect x="18" y="4"  width="2"  height="2"/>
  </g>
</svg>
