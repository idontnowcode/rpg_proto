<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- 고목 수호자 (Ancient Tree Guardian) — large bark face -->
  <!-- Branch crown -->
  <g fill="#443322">
    <rect x="4"  y="0"  width="4"  height="6"/>
    <rect x="10" y="0"  width="2"  height="4"/>
    <rect x="20" y="0"  width="2"  height="4"/>
    <rect x="24" y="0"  width="4"  height="6"/>
    <rect x="6"  y="2"  width="6"  height="2"/>
    <rect x="20" y="2"  width="6"  height="2"/>
  </g>
  <!-- Mossy branches -->
  <g fill="#446633">
    <rect x="4"  y="2"  width="4"  height="2"/>
    <rect x="24" y="2"  width="4"  height="2"/>
    <rect x="8"  y="0"  width="4"  height="2"/>
    <rect x="20" y="0"  width="4"  height="2"/>
  </g>
  <!-- Main trunk body: rough bark -->
  <g fill="#664433">
    <rect x="6"  y="6"  width="20" height="20"/>
    <rect x="4"  y="8"  width="24" height="16"/>
  </g>
  <!-- Bark texture highlight -->
  <g fill="#8B6044">
    <rect x="8"  y="8"  width="4"  height="8"/>
    <rect x="16" y="10" width="6"  height="6"/>
    <rect x="8"  y="18" width="6"  height="4"/>
    <rect x="20" y="18" width="4"  height="4"/>
  </g>
  <!-- Dark hollow eyes (glowing gold inside) -->
  <g fill="#221100">
    <rect x="8"  y="10" width="6"  height="6"/>
    <rect x="18" y="10" width="6"  height="6"/>
  </g>
  <g fill="#EEAA00">
    <rect x="10" y="12" width="2"  height="2"/>
    <rect x="20" y="12" width="2"  height="2"/>
  </g>
  <!-- Bark cracks -->
  <g fill="#331100">
    <rect x="14" y="8"  width="2"  height="16"/>
    <rect x="8"  y="16" width="16" height="2"/>
  </g>
  <!-- Moss patches -->
  <g fill="#557744">
    <rect x="4"  y="10" width="2"  height="4"/>
    <rect x="26" y="10" width="2"  height="4"/>
    <rect x="6"  y="22" width="4"  height="2"/>
    <rect x="22" y="22" width="4"  height="2"/>
  </g>
</svg>
